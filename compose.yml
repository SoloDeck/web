# ===========================================================================
# SoloDesk Web — Unified Docker Compose
# ===========================================================================

services:
  app:
    image: ${REGISTRY:-ghcr.io/solodeck/web}/solodesk-web:latest
    restart: always
    ports:
      - "${WEB_PORT:-5173}:80"
    environment:
      - API_HOST=${API_HOST:-api}
      - API_PORT=${API_PORT:-8000}
    env_file:
      - path: .env
        required: false
    networks:
      - solodesk-network

  # Test runner (Used by local dev / manual testing)
  test:
    build:
      context: .
      target: builder # Re-use the builder stage which has dependencies
    restart: "no"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    volumes:
      - ./src:/app/src
      - ./e2e:/app/e2e
    networks:
      - solodesk-network

networks:
  solodesk-network:
    external: true
    name: solodesk-network
