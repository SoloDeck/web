# ===========================================================================
# SoloDesk Web — Unified Docker Compose
# ===========================================================================

services:
  app:
    image: ${IMAGE_NAME:-solodesk-web:latest}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-5173}:80"
    env_file:
      - path: .env
        required: false

  # Test runner (Used by local dev / manual testing)
  test:
    build:
      context: .
      target: builder # Re-use the builder stage which has dependencies
    restart: "no"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    volumes:
      - ./src:/app/src
      - ./e2e:/app/e2e
