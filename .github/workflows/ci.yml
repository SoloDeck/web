name: CI / CD
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test:
    name: Build / Test
    runs-on: ubuntu-latest
    container:
      image: node:22-alpine
    timeout-minutes: 10
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.head_ref }}

      - name: Install Bun
        run: npm install -g bun

      - name: Install dependencies
        run: bun install

      - name: Build project
        run: bun run build

  build-image:
    name: Build / Image
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Lowercase repository name
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "REGISTRY=ghcr.io/$REPO_LOWER" >> $GITHUB_ENV
      - name: Build and push
        run: |
          docker compose build app
          docker tag web-app:latest ${{ env.REGISTRY }}/solodesk-web:latest
          docker push ${{ env.REGISTRY }}/solodesk-web:latest

  deploy-client:
    name: Deploy / Web / Main
    runs-on: [self-hosted]
    needs: build-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    env:
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Lowercase repository name
        shell: powershell
        run: |
          $repoLower = "${{ github.repository }}".ToLower()
          echo "REGISTRY=ghcr.io/$repoLower" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Pull Image
        shell: powershell
        run: docker pull ${{ env.REGISTRY }}/solodesk-web:latest
      - name: Deploy
        shell: powershell
        run: docker compose up -d app
      - name: Cleanup
        shell: powershell
        run: docker image prune -a -f
