name: CI / CD
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Deny all permissions by default — each job grants only what it needs
permissions:
  contents: read

jobs:
  build-test:
    name: Build / Test
    runs-on: ubuntu-latest
    container:
      image: node:22-alpine
    timeout-minutes: 15
    if: >
      (github.event_name == 'pull_request' && github.base_ref == 'main') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.head_ref || github.ref }}

      - name: Install Bun
        run: npm install -g bun

      - name: Install dependencies
        run: bun install

      - name: Build project
        run: bun run build

  build-image:
    name: Build / Image
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Lowercase repository name
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "REGISTRY=ghcr.io/$REPO_LOWER" >> $GITHUB_ENV
      - name: Build and push
        run: |
          docker build --target runtime -t ${{ env.REGISTRY }}/solodesk-web:latest .
          docker push ${{ env.REGISTRY }}/solodesk-web:latest

  deploy-staging:
    name: Deploy / Staging
    runs-on: [self-hosted]
    needs: build-image
    permissions:
      contents: read
      packages: read   # pull image from GHCR
    environment:
      name: staging
      url: https://staging.solodesk.space
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set registry name
        shell: powershell
        run: |
          $repoLower = "${{ github.repository }}".ToLower()
          "REGISTRY=ghcr.io/$repoLower" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Write staging .env
        shell: powershell
        run: |
          @"
          VITE_API_URL=${{ secrets.VITE_API_URL }}
          "@ | Out-File -FilePath .env -Encoding utf8

      - name: Pull & deploy
        shell: powershell
        run: |
          docker pull ${{ env.REGISTRY }}/solodesk-web:latest
          docker compose -f docker-compose.yml up -d app

      - name: Remove .env
        if: always()
        shell: powershell
        run: Remove-Item -Force .env -ErrorAction SilentlyContinue

      - name: Cleanup old images
        shell: powershell
        run: docker image prune -f

  deploy-production:
    name: Deploy / Production
    runs-on: [self-hosted]
    needs: deploy-staging
    permissions:
      contents: read
      packages: read   # pull image from GHCR
    environment:
      name: production
      url: https://app.solodesk.space
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set registry name
        shell: powershell
        run: |
          $repoLower = "${{ github.repository }}".ToLower()
          "REGISTRY=ghcr.io/$repoLower" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Write production .env
        shell: powershell
        run: |
          @"
          VITE_API_URL=${{ secrets.VITE_API_URL }}
          "@ | Out-File -FilePath .env -Encoding utf8

      - name: Pull & deploy
        shell: powershell
        run: |
          docker pull ${{ env.REGISTRY }}/solodesk-web:latest
          docker compose -f docker-compose.yml up -d app

      - name: Remove .env
        if: always()
        shell: powershell
        run: Remove-Item -Force .env -ErrorAction SilentlyContinue

      - name: Cleanup old images
        shell: powershell
        run: docker image prune -f
