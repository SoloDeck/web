name: CI / CD
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Deny all permissions by default — each job grants only what it needs
permissions:
  contents: read

jobs:
  test-unit:
    name: Test / Unit
    runs-on: ubuntu-latest
    container:
      image: node:22-alpine
    timeout-minutes: 15
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.head_ref || github.ref }}

      - name: Install Bun
        run: npm install -g bun

      - name: Install dependencies
        run: bun install

      - name: Build project
        run: bun run build

      - name: Run unit tests
        run: bun run test:run

  test-integration:
    name: Test / Integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Bun
        run: npm install -g bun

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps

      - name: Run end-to-end tests
        run: bun run test:e2e

  build-image:
    name: Build / Image
    runs-on: ubuntu-latest
    needs: test-integration
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Lowercase repository name
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "REGISTRY=ghcr.io/$REPO_LOWER" >> $GITHUB_ENV
      - name: Build and push
        run: |
          docker build \
            --target runtime \
            --build-arg VITE_API_URL=${{ secrets.VITE_API_URL }} \
            --build-arg VITE_GOOGLE_CLIENT_ID=${{ vars.VITE_GOOGLE_CLIENT_ID }} \
            -t ${{ env.REGISTRY }}/solodesk-web:latest .
          docker push ${{ env.REGISTRY }}/solodesk-web:latest

  deploy-staging:
    name: Deploy / Staging
    runs-on: [self-hosted]
    needs: build-image
    permissions:
      contents: read
      packages: read   # pull image from GHCR
    environment:
      name: staging
      url: ${{ vars.PUBLIC_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set registry name
        shell: powershell
        run: |
          $repoLower = "${{ github.repository }}".ToLower()
          "REGISTRY=ghcr.io/$repoLower" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Write staging .env
        shell: powershell
        run: |
          @"
          VITE_API_URL=${{ secrets.VITE_API_URL }}
          VITE_GOOGLE_CLIENT_ID=${{ vars.VITE_GOOGLE_CLIENT_ID }}
          WEB_PORT=${{ vars.WEB_PORT }}
          API_HOST=${{ vars.API_HOST || 'api' }}
          API_PORT=${{ vars.API_PORT || '8000' }}
          "@ | Out-File -FilePath .env -Encoding utf8

      - name: Pull & deploy
        shell: powershell
        run: |
          $env:WEB_PORT = "${{ vars.WEB_PORT }}"
          $env:API_HOST = "${{ vars.API_HOST || 'api' }}"
          $env:API_PORT = "${{ vars.API_PORT || '8000' }}"
          docker pull ${{ env.REGISTRY }}/solodesk-web:latest
          docker compose -p solodesk-web-staging up -d app

      - name: Remove .env
        if: always()
        shell: powershell
        run: Remove-Item -Force .env -ErrorAction SilentlyContinue


  deploy-production:
    name: Deploy / Production
    runs-on: [self-hosted]
    needs: deploy-staging
    permissions:
      contents: read
      packages: read   # pull image from GHCR
    environment:
      name: production
      url: ${{ vars.PUBLIC_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set registry name
        shell: powershell
        run: |
          $repoLower = "${{ github.repository }}".ToLower()
          "REGISTRY=ghcr.io/$repoLower" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Write production .env
        shell: powershell
        run: |
          @"
          VITE_API_URL=${{ secrets.VITE_API_URL }}
          VITE_GOOGLE_CLIENT_ID=${{ vars.VITE_GOOGLE_CLIENT_ID }}
          WEB_PORT=${{ vars.WEB_PORT }}
          API_HOST=${{ vars.API_HOST || 'api' }}
          API_PORT=${{ vars.API_PORT || '8000' }}
          "@ | Out-File -FilePath .env -Encoding utf8

      - name: Pull & deploy
        shell: powershell
        run: |
          $env:WEB_PORT = "${{ vars.WEB_PORT }}"
          $env:API_HOST = "${{ vars.API_HOST || 'api' }}"
          $env:API_PORT = "${{ vars.API_PORT || '8000' }}"
          docker pull ${{ env.REGISTRY }}/solodesk-web:latest
          docker compose -p solodesk-web-production up -d app

      - name: Remove .env
        if: always()
        shell: powershell
        run: Remove-Item -Force .env -ErrorAction SilentlyContinue

