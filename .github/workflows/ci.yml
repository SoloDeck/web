name: Web CI

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  # ---------------------------------------------------------------------------
  # Phase 1: lint + typecheck + unit — run in parallel
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (ESLint)
    runs-on: [self-hosted, windows, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Build test image
        run: docker compose build test

      - name: Lint
        run: docker compose run --rm test bun run lint

  typecheck:
    name: Type Check (tsc)
    runs-on: [self-hosted, windows, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Build test image
        run: docker compose build test

      - name: Type check + build
        run: docker compose run --rm test bun run build

  unit-test:
    name: Unit Tests (Vitest)
    runs-on: [self-hosted, windows, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Build test image
        run: docker compose build test

      - name: Run unit tests
        run: docker compose run --rm test bun run test:coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: web-coverage
          path: coverage/

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # Phase 2: e2e tests — needs all three above
  # ---------------------------------------------------------------------------
  e2e-test:
    name: E2E Tests (Playwright)
    needs: [lint, typecheck, unit-test]
    runs-on: [self-hosted, windows, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Build app image
        run: docker compose build app

      - name: Start app
        run: |
          docker compose up -d app
          echo "Waiting for app to be ready..."
          sleep 10

      - name: Run Playwright (Chromium)
        run: |
          docker run --rm \
            --network host \
            -v "${GITHUB_WORKSPACE}:/app" \
            -w /app \
            -e VITE_API_URL=${{ vars.VITE_API_URL || 'http://localhost:8000' }} \
            mcr.microsoft.com/playwright:v1.50.0-noble \
            sh -c "npm install -g bun && bun install --frozen-lockfile && bun run test:e2e --project=chromium"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/

      - name: Cleanup
        if: always()
        run: docker compose down --remove-orphans

  # ---------------------------------------------------------------------------
  # Phase 3: build Docker image — only on push to main
  # ---------------------------------------------------------------------------
  build-image:
    name: Build & Push Image
    needs: [e2e-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: [self-hosted, windows, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GHCR_TOKEN }}" | \
            docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build + push
        run: |
          docker buildx build --target runtime \
            --build-arg VITE_API_URL=${{ vars.VITE_API_URL }} \
            -t ghcr.io/${{ github.repository_owner }}/solodesk-web:${{ github.sha }} \
            -t ghcr.io/${{ github.repository_owner }}/solodesk-web:latest \
            --push .

  # ---------------------------------------------------------------------------
  # Phase 4a: deploy staging — auto, no approval gate
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    needs: [build-image]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: [self-hosted, windows, X64]
    environment:
      name: staging
      url: https://staging.solodesk.space
    steps:
      - uses: actions/checkout@v4

      - name: Write staging .env from secrets
        run: |
          cat > .env <<EOF
          VITE_API_URL=${{ secrets.VITE_API_URL }}
          EOF

      - name: Pull latest image
        run: docker compose pull app

      - name: Deploy
        run: docker compose up -d app

      - name: Remove .env
        if: always()
        run: rm -f .env

  # ---------------------------------------------------------------------------
  # Phase 4b: deploy production — requires manual approval
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Production
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: [self-hosted, windows, X64]
    environment:
      name: production
      url: https://app.solodesk.space
    steps:
      - uses: actions/checkout@v4

      - name: Write production .env from secrets
        run: |
          cat > .env <<EOF
          VITE_API_URL=${{ secrets.VITE_API_URL }}
          EOF

      - name: Pull latest image
        run: docker compose pull app

      - name: Deploy
        run: docker compose up -d app

      - name: Remove .env
        if: always()
        run: rm -f .env
